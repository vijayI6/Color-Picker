<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/favicon.jpg" type="image/x-icon">
</head>

<body>
    <div class="text">
        <marquee behavior="alternate" direction="right" scrollamount="12">
            <h1>Welcome Color Picker! Here you can Find RGB, HEX, HSL values of any Color</h1>
        </marquee>
    </div>

    <div class="container">
        <input type="color" name="box" id="box">
    </div>

    <div class="label">
        <input type="text" name="rgb" id="rgb" placeholder="RGB">
    </div>

    <div class="label">
        <input type="text" name="hsl" id="hsl" placeholder="HSL">
    </div>

    <div class="label">
        <input type="text" name="hex" id="hex" placeholder="HEX">
    </div>

    <script src="script.js"></script>
</body>

</html>
