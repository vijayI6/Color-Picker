<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon"
        href="https://media.istockphoto.com/id/1354911608/photo/simple-color-picker-tool-with-pipette-and-rainbow-ring-3d-render-illustartion.jpg?s=612x612&w=0&k=20&c=D8e0O5iea4czaSA-ynYu5MOu7HmdNmkvHQW9Z1mxNoY="
        type="image/x-icon">
</head>

<body>
    <div class="text">
        <marquee behavior="alternate" direction="right" scrollamount="12">
            <h1>Welcome Color Picker! Here you can Find RGB, HEX, HSL values of any Color</h1>
        </marquee>
    </div>

    <div class="container">
        <input type="color" name="box" id="box">
    </div>

    <div class="label">
        <label for="rgb">RGB</label>
        <input type="text" name="rgb" id="rgb">
    </div>

    <div class="label">
        <label for="hsl">HSL</label>
        <input type="text" name="hsl" id="hsl">
    </div>

    <div class="label">
        <label for="hex">HEX</label>
        <input type="text" name="hex" id="hex">
    </div>

    <script src="script.js"></script>
</body>

</html>
